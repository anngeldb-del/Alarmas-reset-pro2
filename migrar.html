<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migrar datos — Alarmas Reset</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070709;color:#fff;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#0f0f14;border:1px solid #1f1f2c;border-radius:16px;padding:32px;max-width:480px;width:100%}
h1{font-size:22px;color:#ff6b35;margin-bottom:8px}
p{color:#888;font-size:14px;line-height:1.6;margin-bottom:20px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px;transition:.2s}
.btn-google{background:#fff;color:#333;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-migrate{background:#ff6b35;color:#fff}
.btn-migrate:disabled{background:#333;color:#666;cursor:not-allowed}
.log{background:#0a0a0f;border:1px solid #1f1f2c;border-radius:8px;padding:16px;margin-top:16px;font-family:monospace;font-size:13px;max-height:300px;overflow-y:auto;display:none}
.log-line{margin-bottom:4px;line-height:1.5}
.ok{color:#00e5c8}
.err{color:#ff4444}
.info{color:#888}
.warn{color:#ffaa00}
#user-section{display:none}
#login-section{}
.avatar{width:36px;height:36px;border-radius:50%;vertical-align:middle;margin-right:8px}
.user-bar{display:flex;align-items:center;background:#141419;border-radius:10px;padding:10px 14px;margin-bottom:20px}
.user-name{font-size:14px;color:#ccc;flex:1}
.btn-sm{background:transparent;border:1px solid #333;color:#888;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="card">
  <h1>🔄 Migrar datos a tu cuenta</h1>
  <p>Esta herramienta copia tus órdenes y servicios antiguos (almacenados sin cuenta) a tu cuenta personal de Google, para que solo tú puedas verlos.</p>

  <div id="login-section">
    <button class="btn btn-google" onclick="loginGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Iniciar sesión con Google
    </button>
  </div>

  <div id="user-section">
    <div class="user-bar">
      <img id="user-avatar" class="avatar" src="" onerror="this.style.display='none'">
      <span class="user-name" id="user-name"></span>
      <button class="btn-sm" onclick="logout()">Salir</button>
    </div>
    <button class="btn btn-migrate" id="btn-migrate" onclick="migrar()">🚀 Iniciar migración</button>
    <div class="log" id="log"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, setDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOUGIWvrPtdKf9pnoYlh3NIHHiBO_R7mE",
  authDomain: "alarmas-reset-e3484.firebaseapp.com",
  projectId: "alarmas-reset-e3484",
  storageBucket: "alarmas-reset-e3484.firebasestorage.app",
  messagingSenderId: "1096561116547",
  appId: "1:1096561116547:web:b13df05c092785723aa2b6"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

onAuthStateChanged(auth, user => {
  currentUser = user;
  document.getElementById('login-section').style.display = user ? 'none' : 'block';
  document.getElementById('user-section').style.display  = user ? 'block' : 'none';
  if (user) {
    document.getElementById('user-name').textContent = user.displayName || user.email;
    document.getElementById('user-avatar').src = user.photoURL || '';
  }
});

window.loginGoogle = async () => {
  try { await signInWithRedirect(auth, provider); }
  catch(e) { alert('Error: ' + e.message); }
};
getRedirectResult(auth).catch(e => alert('Error al iniciar sesión: ' + e.message));

window.logout = async () => { await signOut(auth); };

function log(msg, type='info') {
  const logEl = document.getElementById('log');
  logEl.style.display = 'block';
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

window.migrar = async () => {
  if (!currentUser) { alert('Inicia sesión primero'); return; }
  const btn = document.getElementById('btn-migrate');
  btn.disabled = true;
  btn.textContent = 'Migrando...';
  const uid = currentUser.uid;
  let total = 0;
  let errores = 0;

  // 1. Migrar órdenes
  log('📋 Leyendo órdenes antiguas...');
  try {
    const snap = await getDocs(query(collection(db,'ordenes'), orderBy('fecha_creacion','desc')));
    log(`   Encontradas: ${snap.size} órdenes`, 'ok');
    for (const d of snap.docs) {
      try {
        const data = d.data();
        await addDoc(collection(db,'usuarios',uid,'ordenes'), data);
        log(`   ✓ Orden: ${data.cliente || data.vehiculo || d.id}`, 'ok');
        total++;
      } catch(e) {
        log(`   ✗ Error en orden ${d.id}: ${e.message}`, 'err');
        errores++;
      }
    }
  } catch(e) {
    log('   No se encontraron órdenes antiguas o ya fueron migradas: ' + e.message, 'warn');
  }

  // 2. Migrar servicios del checklist
  log('🔧 Leyendo servicios del checklist...');
  try {
    const snap = await getDocs(query(collection(db,'checklist_services'), orderBy('createdAt','asc')));
    log(`   Encontrados: ${snap.size} servicios`, 'ok');
    for (const d of snap.docs) {
      try {
        const data = d.data();
        await setDoc(doc(db,'usuarios',uid,'checklist_services',d.id), data);
        log(`   ✓ Servicio: ${data.name || d.id}`, 'ok');
        total++;
      } catch(e) {
        log(`   ✗ Error en servicio ${d.id}: ${e.message}`, 'err');
        errores++;
      }
    }
  } catch(e) {
    log('   No se encontraron servicios antiguos: ' + e.message, 'warn');
  }

  // 3. Migrar ítems personalizados del checklist
  log('📝 Leyendo ítems personalizados...');
  try {
    const snap = await getDocs(query(collection(db,'checklist_custom_items'), orderBy('createdAt','asc')));
    log(`   Encontrados: ${snap.size} ítems`, 'ok');
    for (const d of snap.docs) {
      try {
        const data = d.data();
        await setDoc(doc(db,'usuarios',uid,'checklist_custom_items',d.id), data);
        log(`   ✓ Ítem: ${data.label || d.id}`, 'ok');
        total++;
      } catch(e) {
        log(`   ✗ Error en ítem ${d.id}: ${e.message}`, 'err');
        errores++;
      }
    }
  } catch(e) {
    log('   No se encontraron ítems personalizados: ' + e.message, 'warn');
  }

  log('─────────────────────────────', 'info');
  if (errores === 0) {
    log(`✅ Migración completa: ${total} registros migrados`, 'ok');
    log('Ya puedes abrir la app principal.', 'ok');
    btn.textContent = '✅ Migración completada';
  } else {
    log(`⚠️ Completado con ${errores} errores. ${total} registros migrados.`, 'warn');
    btn.disabled = false;
    btn.textContent = '🔄 Reintentar';
  }
};
</script>
</body>
</html>
